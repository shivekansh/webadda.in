<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="The page you are looking for doesn't exist. Let us help you find what you need.">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found | webadda.in</title>
  
  <style>
    /* ================================
       DESIGN TOKENS (Aligned with webadda.in)
       ================================ */
    :root {
      /* Typography */
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;

      /* Radii */
      --radius-sm: 0.375rem;
      --radius: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --radius-2xl: 1.5rem;

      /* Colors — Dark Mode Default for webadda.in */
      --bg-page: #0a0f1e;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-elevated: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --error-code: #f8fafc;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --glow: 0 0 80px rgba(59, 130, 246, 0.15);

      /* Motion */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-page: #f8fafc;
        --surface: #ffffff;
        --surface-elevated: #f1f5f9;
        --border: #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #94a3b8;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --error-code: #0f172a;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        --glow: 0 0 60px rgba(37, 99, 235, 0.12);
      }
    }

    /* ================================
       RESET & BASE
       ================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: var(--font-sans);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-primary);
      background-color: var(--bg-page);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% -10%, rgba(59, 130, 246, 0.12), transparent 50%),
        radial-gradient(circle at 80% 110%, rgba(34, 197, 94, 0.06), transparent 40%);
      pointer-events: none;
      z-index: -1;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* ================================
       LAYOUT
       ================================ */
    .page { display: flex; flex-direction: column; min-height: 100dvh; }
    .page__header { padding: var(--space-6); text-align: center; }
    .page__main { flex: 1; display: grid; place-items: center; padding: var(--space-6); }
    .page__footer { padding: var(--space-6); text-align: center; color: var(--text-tertiary); font-size: 0.875rem; }

    .container { width: 100%; max-width: 680px; margin: 0 auto; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: clamp(var(--space-8), 6vw, var(--space-12)) clamp(var(--space-6), 5vw, var(--space-10));
      box-shadow: var(--shadow), var(--glow);
      text-align: center;
      backdrop-filter: blur(12px);
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ================================
       BRAND
       ================================ */
    .brand {
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-weight: 700; font-size: 1.25rem; color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .brand::before {
      content: ""; width: 0.75rem; height: 0.75rem; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 12px var(--accent);
    }

    /* ================================
       ERROR SECTION
       ================================ */
    .compass {
      margin: 0 auto var(--space-6);
      width: 8rem; height: 8rem;
      color: var(--accent);
    }
    .compass svg { width: 100%; height: 100%; display: block; }
    .compass-needle { transform-origin: center; animation: needle 6s ease-in-out infinite; }

    .error__code {
      display: block; font-size: clamp(4rem, 12vw, 6rem);
      font-weight: 800; line-height: 1; color: var(--error-code);
      letter-spacing: -0.05em; opacity: 0.9;
    }
    .error__heading {
      margin: var(--space-4) 0 var(--space-2);
      font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; line-height: 1.2;
    }
    .error__subheading {
      margin: 0 auto var(--space-6); max-width: 48ch;
      color: var(--text-secondary); font-size: 1.125rem;
    }
    .error__url {
      display: inline-block; max-width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--surface-elevated); border: 1px solid var(--border);
      border-radius: var(--radius); font-family: var(--font-mono);
      font-size: 0.875rem; color: var(--text-tertiary); word-break: break-all;
    }

    /* ================================
       CONTACT GRID (Elegant Integration)
       ================================ */
    .contact-grid {
      display: grid; gap: var(--space-3);
      margin: var(--space-8) auto; max-width: 48ch;
    }
    .contact-card {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: var(--surface-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-lg); text-align: left;
      transition: border-color var(--transition-fast), transform var(--transition-fast), background-color var(--transition-fast);
    }
    .contact-card:hover {
      border-color: var(--accent); background: var(--surface); transform: translateY(-2px);
    }
    .contact-card__icon {
      width: 2.75rem; height: 2.75rem; border-radius: 50%;
      background: var(--surface); display: flex; align-items: center; justify-content: center;
      color: var(--accent); border: 1px solid var(--border); flex-shrink: 0;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }
    .contact-card:hover .contact-card__icon { color: var(--accent-hover); border-color: var(--accent); }
    .contact-card__content { display: flex; flex-direction: column; gap: 2px; }
    .contact-card__label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .contact-card__value { color: var(--text-primary); font-weight: 600; font-size: 0.9rem; transition: color var(--transition-fast); }
    .contact-card:hover .contact-card__value { color: var(--accent); }

    /* ================================
       SEARCH & ACTIONS
       ================================ */
    .search { margin: var(--space-8) 0; }
    .search__form { display: flex; gap: var(--space-2); }
    .search__input {
      flex: 1; padding: var(--space-3) var(--space-4); font: inherit;
      color: var(--text-primary); background: var(--surface-elevated);
      border: 1px solid var(--border); border-radius: var(--radius);
      transition: border-color var(--transition-fast);
    }
    .search__input:focus { outline: none; border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-5); font: inherit; font-weight: 600;
      border-radius: var(--radius); cursor: pointer; border: 1px solid transparent;
      transition: all var(--transition-fast); white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn--primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25); }
    .btn--primary:hover { background: var(--accent-hover); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35); }
    .btn--secondary { background: var(--surface-elevated); color: var(--text-primary); border-color: var(--border); }
    .btn--secondary:hover { background: var(--surface); border-color: var(--text-secondary); }

    .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: var(--space-3); margin-top: var(--space-6); }

    /* ================================
       SUGGESTIONS
       ================================ */
    .suggestions { margin-top: var(--space-6); }
    .suggestions__list {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-wrap: wrap; justify-content: center; gap: var(--space-2);
    }
    .suggestions__link {
      padding: var(--space-2) var(--space-3); font-size: 0.875rem;
      color: var(--text-secondary); background: var(--surface-elevated);
      border: 1px solid var(--border); border-radius: 999px;
      transition: all var(--transition-fast);
    }
    .suggestions__link:hover { color: var(--text-primary); border-color: var(--accent); background: var(--surface); }

    /* ================================
       ANIMATIONS
       ================================ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes needle {
      0%, 100% { transform: rotate(-25deg); }
      50% { transform: rotate(25deg); }
    }

    @media (max-width: 640px) {
      .search__form { flex-direction: column; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="page">
    <header class="page__header" role="banner">
      <div class="container">
        <a class="brand" href="/" aria-label="webadda.in home">webadda.in</a>
      </div>
    </header>

    <main class="page__main" role="main">
      <div class="container">
        <article class="card">
          <section class="error" role="alert">
            <figure class="compass" aria-hidden="true">
              <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                <circle cx="64" cy="64" r="58" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
                <circle cx="64" cy="64" r="48" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1"/>
                <g stroke="currentColor" stroke-width="2" opacity="0.3">
                  <line x1="64" y1="12" x2="64" y2="20"/>
                  <line x1="64" y1="108" x2="64" y2="116"/>
                  <line x1="12" y1="64" x2="20" y2="64"/>
                  <line x1="108" y1="64" x2="116" y2="64"/>
                </g>
                <text x="64" y="34" text-anchor="middle" fill="currentColor" font-size="12" font-weight="bold" opacity="0.6">N</text>
                <g class="compass-needle">
                  <path d="M64 18 L70 64 L64 110 L58 64 Z" fill="currentColor" opacity="0.8"/>
                  <circle cx="64" cy="64" r="5" fill="var(--accent)"/>
                </g>
              </svg>
            </figure>

            <span class="error__code" aria-hidden="true">404</span>
            <h1 class="error__heading">Page not found</h1>
            <p class="error__subheading">The page you requested doesn't exist or has been moved.</p>
            <div class="error__url" id="attempted-url" aria-label="Attempted URL"></div>
          </section>

          <!-- Sleek Contact Integration -->
          <div class="contact-grid">
            <a href="tel:+919997954148" class="contact-card">
              <div class="contact-card__icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              </div>
              <div class="contact-card__content">
                <span class="contact-card__label">Call or WhatsApp</span>
                <span class="contact-card__value">+91 99979 54148</span>
              </div>
            </a>

            <a href="mailto:shivekansh@gmail.com" class="contact-card">
              <div class="contact-card__icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
              </div>
              <div class="contact-card__content">
                <span class="contact-card__label">Email Support</span>
                <span class="contact-card__value">shivekansh@gmail.com</span>
              </div>
            </a>
          </div>

          <section class="search">
            <form id="search-form" class="search__form" action="/" method="get">
              <input type="search" name="q" class="search__input" placeholder="Search webadda.in…" aria-label="Search">
              <button type="submit" class="btn btn--secondary">Search</button>
            </form>
          </section>

          <nav class="suggestions">
            <ul class="suggestions__list">
              <li><a href="/" class="suggestions__link">Home</a></li>
              <li><a href="/?p=services" class="suggestions__link">Services</a></li>
              <li><a href="/?p=pricing" class="suggestions__link">Pricing</a></li>
              <li><a href="/?p=contact" class="suggestions__link">Contact</a></li>
              <li><a href="/?p=faq" class="suggestions__link">FAQ</a></li>
            </ul>
          </nav>

          <div class="actions">
            <a href="/" class="btn btn--primary">Take me home</a>
            <button id="go-back-btn" type="button" class="btn btn--secondary">Go back</button>
          </div>
        </article>
      </div>
    </main>

    <footer class="page__footer" role="contentinfo">
      <div class="container">
        <p>© <span id="year">2026</span> webadda.in. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script>
    (function() {
      'use strict';
      
      // Display the attempted URL
      const urlElement = document.getElementById('attempted-url');
      if (urlElement) {
        // Read 'from' parameter if coming from SPA redirect, otherwise use current path
        const params = new URLSearchParams(window.location.search);
        let path = params.get('from') || (window.location.pathname + window.location.search);
        
        // Only show path and query to prevent XSS from full URL
        urlElement.textContent = path.length > 50 ? path.substring(0, 50) + '...' : path;
      }

      // Handle "Go back" button
      const backBtn = document.getElementById('go-back-btn');
      if (backBtn) {
        if (window.history.length > 1 && document.referrer) {
          backBtn.addEventListener('click', () => window.history.back());
        } else {
          backBtn.hidden = true;
        }
      }

      // Handle Search form redirect to SPA query
      const searchForm = document.getElementById('search-form');
      if (searchForm) {
        searchForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const query = searchForm.querySelector('input[name="q"]').value;
          if (query.trim()) {
            window.location.href = `/?q=${encodeURIComponent(query)}`;
          }
        });
      }

      // Set current year
      const yearElement = document.getElementById('year');
      if (yearElement) {
        yearElement.textContent = new Date().getFullYear();
      }
    })();
  </script>
</body>
</html>
